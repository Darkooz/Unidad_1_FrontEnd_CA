<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub | Acceso Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2b1454;   /* Púrpura corporativo */
            --secondary: #ffc600; /* Amarillo/Dorado del logo */
            --white: #ffffff;
            --text: #2d3436;
            /* Gradiente moderno para el fondo */
            --bg-gradient: linear-gradient(135deg, #2b1454 0%, #6c5ce7 100%);
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 10%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            color: var(--secondary);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a {
            text-decoration: none;
            color: var(--white);
            margin-left: 25px;
            font-weight: 400;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--secondary);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .card {
            background: var(--white);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 198, 0, 0.2);
        }

        .logo-container {
            margin-bottom: 1.5rem;
        }

        .logo-container img {
            width: 100%;
            max-width: 220px;
            height: auto;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        p {
            color: #636e72;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        form {
            text-align: left;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            background-color: #fffdf5;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: block;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(43, 20, 84, 0.3);
            margin-top: 1rem;
        }

        .btn:hover {
            background: #3e1e75;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(43, 20, 84, 0.4);
            border: 1px solid var(--secondary);
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            color: rgba(248, 152, 7, 0.884);
        }
    </style>
</head>
<body>

    <header>
        <h1>SportClub</h1>
        <nav>
            <a href="#">Volver</a>
            <a href="#">Planes</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <main>
        <section class="card">
            <div class="logo-container">
                <img src="logo_empresa_letra_v1.png" alt="SportClub Logo">
            </div>
            
            <h2>Acceso Socios</h2>
            <p>Bienvenido otra vez. Ingresa tus datos para gestionar tu entrenamiento.</p>
            
            <form action="#">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@deportista.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn">INICIAR SESIÓN</button>
            </form>
        </section>
    </main>

    <footer>
        <p style="color:#ffc600";>© 2026 SportClub Chile - Sistema de Gestión de Usuarios.</p>
    </footer>

</body>
</html>
