<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub | Acceso Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
 
    <header>
        <h1>SportClub</h1>
        <nav>
            <a href="#">Volver</a>
            <a href="#">Planes</a>
            <a href="#">Contacto</a>
        </nav>
    </header>
 
    <main>
        <section class="card">
 
            <div class="logo-container">
                <img src="logo_empresa_letra_v1.png" alt="SportClub Logo">
            </div>
 
            <h2>Acceso Socios</h2>
            <p class="card-desc">Bienvenido de vuelta. Ingresa tus datos para gestionar tu entrenamiento.</p>
 
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@deportista.com" required>
                </div>
 
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
 
                <button type="button" class="btn" onclick="entrar()">INICIAR SESIÓN</button>
            </form>
 
            <div class="links">
                <a href="recover.html">¿Olvidaste tu contraseña?</a>
                <a href="register.html">¿No tienes cuenta? Regístrate aquí</a>
            </div>
 
        </section>
    </main>
 
    <footer>
        <p>© 2026 SportClub Chile — Sistema de Gestión de Usuarios Elite.</p>
    </footer>

    <script>
        function entrar() {
            // Obtenemos el correo y lo pasamos a minúsculas
            const emailInput = document.getElementById('email').value.trim().toLowerCase();
            
            if (emailInput === "") {
                alert("Por favor, ingresa tu correo electrónico.");
                return;
            }

            // Lógica de redirección según el correo
            if (emailInput === 'admin@sportclub.cl') {
                window.location.href = 'dashboard-admin.html';
            } else if (emailInput === 'coach@sportclub.cl') {
                window.location.href = 'dashboard-coach.html';
            } else {
                // Cualquier otro correo entra como usuario estándar
                window.location.href = 'dashboard-usuario.html';
            }
        }
    </script>
 
</body>
</html>
